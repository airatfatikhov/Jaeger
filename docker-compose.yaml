version: '3.8'

services:
  # ============ COLLECTOR ============
  # Принимает спаны от приложений (HTTP/gRPC/Thrift) и пишет в ES
  jaeger-collector:
    image: repo.vsk.ru:5001/jaegertracing/jaeger-collector:1.62.0
    container_name: jaeger-collector
    ports:
      - "14268:14268"   # HTTP  — Jaeger Thrift (legacy)
      - "14250:14250"   # gRPC  — Jaeger protobuf
      - "9411:9411"     # Zipkin compatible
    environment:
      - SPAN_STORAGE_TYPE=elasticsearch
      - ES_SERVER_URLS=http://elasticsearch:9200
      - ES_NUM_REPLICAS=0
      - LOG_LEVEL=info
    depends_on:
      elasticsearch:
        condition: service_healthy
 

  # ============ QUERY + UI ============
  # Query = бэкенд + UI (веб-интерфейс на 16686)
  jaeger-query:
    image: repo.vsk.ru:5001/jaegertracing/jaeger-query:1.62.0
    stdin_open: true
    tty: true
    container_name: jaeger-query
    ports:
      - "16686:16686"   # Web UI
      - "16687:16687"   # Health check
    environment:
      - SPAN_STORAGE_TYPE=elasticsearch
      - ES_SERVER_URLS=http://elasticsearch:9200
      - METRICS_STORAGE_TYPE=elasticsearch
      - TZ=Europe/Moscow
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - jaeger
    deploy:
      replicas: 1
      placement:
        constraints:
          - "node.hostname == servername"
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.ui.rule=Host(`ui.jaeger.test.local`)"
        - "traefik.http.routers.ui.entrypoints=websecure"
        - "traefik.http.routers.ui.tls=true"
        - "traefik.http.services.ui.loadbalancer.server.port=16686"
        - "com.containrrr.watchtower.enable=false"
